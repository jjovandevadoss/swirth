<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Mappings - Lab Interface</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/jquery.json-viewer@1.5.0/json-viewer/jquery.json-viewer.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #334155;
            --text-muted: #64748b;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --border-color: #e2e8f0;
            --card-bg: #ffffff;
            --header-height: 60px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 0 2rem;
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 10;
        }

        .brand {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .brand i { color: var(--primary-color); }

        nav { display: flex; gap: 2rem; }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: color 0.15s;
            padding: 0.5rem 0;
            border-bottom: 2px solid transparent;
        }
        nav a:hover { color: var(--primary-color); }
        nav a.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }

        main {
            flex: 1;
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .card-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            font-size: 0.95rem;
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 8px 8px 0 0;
        }

        .card-body { padding: 1.5rem; }

        .mapping-layout {
            display: grid;
            grid-template-columns: 1fr 1fr 400px;
            gap: 1.5rem;
        }

        /* Profile Manager */
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.625rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.15s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .form-group textarea { resize: vertical; min-height: 60px; }

        .button-group {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .btn {
            padding: 0.625rem 1.25rem;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }
        .btn-primary:hover:not(:disabled) { background-color: var(--primary-hover); }
        
        .btn-success {
            background-color: var(--success-color);
            color: white;
        }
        .btn-success:hover:not(:disabled) { background-color: #059669; }
        
        .btn-secondary {
            background-color: #e2e8f0;
            color: var(--text-color);
        }
        .btn-secondary:hover:not(:disabled) { background-color: #cbd5e1; }
        
        .btn-danger {
            background-color: var(--danger-color);
            color: white;
        }
        .btn-danger:hover:not(:disabled) { background-color: #dc2626; }

        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.8rem;
        }

        /* Profile Selector */
        .profile-selector {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .profile-selector select {
            flex: 1;
            padding: 0.625rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .active-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.75rem;
            background: #dcfce7;
            color: #15803d;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Mapping Rules Table */
        .rules-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .rules-table th {
            background: #f8fafc;
            padding: 0.75rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.85rem;
            border-bottom: 2px solid var(--border-color);
            color: var(--text-muted);
        }
        .rules-table td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }
        .rules-table input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .rules-table input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .rules-table tbody tr:hover {
            background: #f8fafc;
        }

        .field-input-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .field-input-group input {
            flex: 1;
        }
        .field-input-group .btn-icon {
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.15s;
        }
        .field-input-group .btn-icon:hover {
            background: #f8fafc;
            color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 3rem;
            color: var(--border-color);
            margin-bottom: 1rem;
        }

        /* Preview Panel */
        .preview-controls {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            margin-bottom: 1rem;
        }
        .preview-controls select {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .json-preview {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1rem;
            max-height: 500px;
            overflow: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .modal.active { display: flex; }
        
        .modal-content {
            background: white;
            border-radius: 8px;
            max-width: 800px;
            width: 100%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }
        .modal-close:hover {
            background: #f8fafc;
            color: var(--text-color);
        }
        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
        }

        /* Field Browser Tree */
        .field-tree {
            font-size: 0.9rem;
        }
        .field-tree ul {
            list-style: none;
            padding-left: 1.5rem;
        }
        .field-tree > ul {
            padding-left: 0;
        }
        .field-tree li {
            margin: 0.25rem 0;
        }
        .field-node {
            padding: 0.375rem 0.5rem;
            cursor: pointer;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: background 0.1s;
        }
        .field-node:hover {
            background: #f1f5f9;
        }
        .field-node.selected {
            background: #dbeafe;
            color: var(--primary-color);
            font-weight: 500;
        }
        .field-node i {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .field-path {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: none;
            align-items: center;
            gap: 0.75rem;
            z-index: 2000;
            max-width: 400px;
        }
        .toast.active { display: flex; }
        .toast.success { border-left: 4px solid var(--success-color); }
        .toast.error { border-left: 4px solid var(--danger-color); }
        .toast.info { border-left: 4px solid var(--primary-color); }
        .toast i {
            font-size: 1.25rem;
        }
        .toast.success i { color: var(--success-color); }
        .toast.error i { color: var(--danger-color); }
        .toast.info i { color: var(--primary-color); }

        .protocol-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .protocol-tab {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.15s;
        }
        .protocol-tab:hover {
            background: #f8fafc;
        }
        .protocol-tab.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <i class="fas fa-flask"></i>
            Lab Interface - Field Mappings
        </div>
        <nav>
            <a href="/"><i class="fas fa-home"></i> Dashboard</a>
            <a href="/settings"><i class="fas fa-cog"></i> Settings</a>
            <a href="/mappings" class="active"><i class="fas fa-project-diagram"></i> Mappings</a>
        </nav>
    </header>

    <main>
        <div class="mapping-layout">
            <!-- Profile Manager -->
            <div class="card">
                <div class="card-header">
                    <span><i class="fas fa-folder"></i> Mapping Profile</span>
                    <span id="activeBadge" class="active-badge" style="display: none;">
                        <i class="fas fa-check-circle"></i> Active
                    </span>
                </div>
                <div class="card-body">
                    <div class="profile-selector">
                        <select id="profileSelect">
                            <option value="">-- Select Profile --</option>
                        </select>
                        <button class="btn btn-sm btn-secondary" onclick="newProfile()">
                            <i class="fas fa-plus"></i> New
                        </button>
                        <button class="btn btn-sm btn-secondary" onclick="duplicateProfile()" id="btnDuplicate" disabled>
                            <i class="fas fa-copy"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteProfile()" id="btnDelete" disabled>
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>

                    <div class="form-group">
                        <label for="profileName">Profile Name *</label>
                        <input type="text" id="profileName" placeholder="e.g., Lab A Mapping">
                    </div>

                    <div class="form-group">
                        <label for="profileDescription">Description</label>
                        <textarea id="profileDescription" placeholder="Optional description of this mapping"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="protocolFilter">Protocol Filter</label>
                        <select id="protocolFilter">
                            <option value="ALL">All Protocols</option>
                            <option value="HL7">HL7 Only</option>
                            <option value="ASTM">ASTM Only</option>
                        </select>
                    </div>

                    <div class="button-group">
                        <button class="btn btn-primary" onclick="saveProfile()">
                            <i class="fas fa-save"></i> Save Profile
                        </button>
                        <button class="btn btn-success" onclick="activateProfile()" id="btnActivate" disabled>
                            <i class="fas fa-check-circle"></i> Set Active
                        </button>
                    </div>
                </div>
            </div>

            <!-- Mapping Rules -->
            <div class="card">
                <div class="card-header">
                    <span><i class="fas fa-list"></i> Mapping Rules</span>
                    <button class="btn btn-sm btn-primary" onclick="addMappingRule()">
                        <i class="fas fa-plus"></i> Add Rule
                    </button>
                </div>
                <div class="card-body">
                    <div id="rulesContainer">
                        <table class="rules-table" id="rulesTable">
                            <thead>
                                <tr>
                                    <th style="width: 40%;">Source Field Path</th>
                                    <th style="width: 40%;">Target Field Name</th>
                                    <th style="width: 15%;">Transform</th>
                                    <th style="width: 5%;"></th>
                                </tr>
                            </thead>
                            <tbody id="rulesTableBody">
                                <tr>
                                    <td colspan="4">
                                        <div class="empty-state">
                                            <i class="fas fa-project-diagram"></i>
                                            <p>No mapping rules yet. Click "Add Rule" to get started.</p>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Preview Panel -->
            <div class="card">
                <div class="card-header">
                    <span><i class="fas fa-eye"></i> Preview</span>
                </div>
                <div class="card-body">
                    <div class="preview-controls">
                        <select id="sampleProtocol" onchange="loadSampleData()">
                            <option value="HL7">HL7 Sample</option>
                            <option value="ASTM">ASTM Sample</option>
                        </select>
                        <button class="btn btn-sm btn-primary" onclick="previewMapping()">
                            <i class="fas fa-play"></i> Test
                        </button>
                    </div>
                    <div class="json-preview" id="previewOutput">
                        <div style="text-align: center; padding: 2rem; color: var(--text-muted);">
                            <i class="fas fa-info-circle" style="font-size: 2rem; margin-bottom: 0.5rem;"></i>
                            <p>Configure mapping rules and click "Test" to preview output</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Field Browser Modal -->
    <div class="modal" id="fieldBrowserModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-sitemap"></i> Select Field</h3>
                <button class="modal-close" onclick="closeFieldBrowser()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="protocol-tabs">
                    <button class="protocol-tab active" onclick="switchProtocolTab('HL7')">HL7 Fields</button>
                    <button class="protocol-tab" onclick="switchProtocolTab('ASTM')">ASTM Fields</button>
                </div>
                <div class="field-tree" id="fieldTree"></div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage"></span>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery.json-viewer@1.5.0/json-viewer/jquery.json-viewer.js"></script>
    <script>
        let currentProfileId = null;
        let sampleData = {};
        let currentInputTarget = null;

        // Initialize
        $(document).ready(function() {
            loadProfiles();
            loadSampleData();
        });

        // Load all profiles
        function loadProfiles() {
            $.get('/api/mappings', function(response) {
                if (response.success) {
                    const select = $('#profileSelect');
                    select.empty();
                    select.append('<option value="">-- Select Profile --</option>');
                    
                    response.profiles.forEach(profile => {
                        const option = $('<option>')
                            .val(profile.id)
                            .text(profile.name + (profile.is_active ? ' (Active)' : ''));
                        select.append(option);
                    });
                }
            }).fail(function() {
                showToast('Failed to load profiles', 'error');
            });
        }

        // Profile selection changed
        $('#profileSelect').change(function() {
            const profileId = $(this).val();
            if (profileId) {
                loadProfile(profileId);
            } else {
                clearForm();
            }
        });

        // Load specific profile
        function loadProfile(profileId) {
            $.get(`/api/mappings/${profileId}`, function(response) {
                if (response.success) {
                    const profile = response.profile;
                    currentProfileId = profile.id;
                    
                    $('#profileName').val(profile.name);
                    $('#profileDescription').val(profile.description || '');
                    $('#protocolFilter').val(profile.protocol_filter || 'ALL');
                    
                    // Show active badge
                    if (profile.is_active) {
                        $('#activeBadge').show();
                        $('#btnActivate').prop('disabled', true);
                    } else {
                        $('#activeBadge').hide();
                        $('#btnActivate').prop('disabled', false);
                    }
                    
                    // Enable buttons
                    $('#btnDuplicate, #btnDelete').prop('disabled', false);
                    if (profile.is_active) {
                        $('#btnDelete').prop('disabled', true);
                    }
                    
                    // Load mapping rules
                    loadMappingRules(profile.config || []);
                }
            }).fail(function() {
                showToast('Failed to load profile', 'error');
            });
        }

        // Load mapping rules into table
        function loadMappingRules(rules) {
            const tbody = $('#rulesTableBody');
            tbody.empty();
            
            if (rules.length === 0) {
                tbody.append(`
                    <tr>
                        <td colspan="4">
                            <div class="empty-state">
                                <i class="fas fa-project-diagram"></i>
                                <p>No mapping rules yet. Click "Add Rule" to get started.</p>
                            </div>
                        </td>
                    </tr>
                `);
                return;
            }
            
            rules.forEach((rule, index) => {
                addRuleRow(rule);
            });
        }

        // Add new mapping rule row
        function addMappingRule() {
            addRuleRow({source_path: '', target_path: '', transform: null});
        }

        function addRuleRow(rule) {
            const tbody = $('#rulesTableBody');
            
            // Remove empty state if present
            if (tbody.find('.empty-state').length > 0) {
                tbody.empty();
            }
            
            const row = $(`
                <tr>
                    <td>
                        <div class="field-input-group">
                            <input type="text" class="source-path" value="${rule.source_path || ''}" 
                                   placeholder="e.g., patient.id or observations[*].value">
                            <button class="btn-icon" onclick="openFieldBrowser(this)" title="Browse fields">
                                <i class="fas fa-sitemap"></i>
                            </button>
                        </div>
                    </td>
                    <td>
                        <input type="text" class="target-path" value="${rule.target_path || ''}" 
                               placeholder="e.g., patientId or results[*].testValue">
                    </td>
                    <td>
                        <select class="transform">
                            <option value="">None</option>
                            <option value="uppercase"${rule.transform === 'uppercase' ? ' selected' : ''}>Uppercase</option>
                            <option value="lowercase"${rule.transform === 'lowercase' ? ' selected' : ''}>Lowercase</option>
                            <option value="trim"${rule.transform === 'trim' ? ' selected' : ''}>Trim</option>
                            <option value="string"${rule.transform === 'string' ? ' selected' : ''}>String</option>
                        </select>
                    </td>
                    <td>
                        <button class="btn-icon" onclick="removeRuleRow(this)" title="Remove">
                            <i class="fas fa-trash" style="color: var(--danger-color);"></i>
                        </button>
                    </td>
                </tr>
            `);
            
            tbody.append(row);
        }

        function removeRuleRow(btn) {
            const tbody = $('#rulesTableBody');
            $(btn).closest('tr').remove();
            
            // Show empty state if no rows left
            if (tbody.find('tr').length === 0) {
                tbody.append(`
                    <tr>
                        <td colspan="4">
                            <div class="empty-state">
                                <i class="fas fa-project-diagram"></i>
                                <p>No mapping rules yet. Click "Add Rule" to get started.</p>
                            </div>
                        </td>
                    </tr>
                `);
            }
        }

        // Save profile
        function saveProfile() {
            const name = $('#profileName').val().trim();
            if (!name) {
                showToast('Profile name is required', 'error');
                return;
            }
            
            const config = collectMappingRules();
            if (config.length === 0) {
                showToast('At least one mapping rule is required', 'error');
                return;
            }
            
            const data = {
                name: name,
                description: $('#profileDescription').val().trim(),
                protocol_filter: $('#protocolFilter').val(),
                config: config
            };
            
            const method = currentProfileId ? 'PUT' : 'POST';
            const url = currentProfileId ? `/api/mappings/${currentProfileId}` : '/api/mappings';
            
            $.ajax({
                url: url,
                method: method,
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: function(response) {
                    if (response.success) {
                        showToast(currentProfileId ? 'Profile updated' : 'Profile created', 'success');
                        if (!currentProfileId) {
                            currentProfileId = response.profile_id;
                        }
                        loadProfiles();
                        $('#profileSelect').val(currentProfileId);
                        $('#btnDuplicate, #btnDelete, #btnActivate').prop('disabled', false);
                    } else {
                        showToast(response.error || 'Failed to save profile', 'error');
                    }
                },
                error: function(xhr) {
                    const error = xhr.responseJSON?.error || 'Failed to save profile';
                    showToast(error, 'error');
                }
            });
        }

        // Collect mapping rules from table
        function collectMappingRules() {
            const rules = [];
            $('#rulesTableBody tr').each(function() {
                const row = $(this);
                if (row.find('.empty-state').length > 0) return;
                
                const sourcePath = row.find('.source-path').val().trim();
                const targetPath = row.find('.target-path').val().trim();
                const transform = row.find('.transform').val();
                
                if (sourcePath && targetPath) {
                    rules.push({
                        source_path: sourcePath,
                        target_path: targetPath,
                        transform: transform || null
                    });
                }
            });
            return rules;
        }

        // New profile
        function newProfile() {
            clearForm();
            currentProfileId = null;
            $('#profileSelect').val('');
            showToast('Create a new mapping profile', 'info');
        }

        // Duplicate profile
        function duplicateProfile() {
            if (!currentProfileId) return;
            
            const newName = $('#profileName').val() + ' (Copy)';
            $('#profileName').val(newName);
            currentProfileId = null;
            $('#activeBadge').hide();
            $('#btnActivate').prop('disabled', true);
            showToast('Make changes and save to create a duplicate', 'info');
        }

        // Delete profile
        function deleteProfile() {
            if (!currentProfileId) return;
            
            if (!confirm('Are you sure you want to delete this mapping profile?')) {
                return;
            }
            
            $.ajax({
                url: `/api/mappings/${currentProfileId}`,
                method: 'DELETE',
                success: function(response) {
                    if (response.success) {
                        showToast('Profile deleted', 'success');
                        clearForm();
                        loadProfiles();
                    } else {
                        showToast(response.error || 'Failed to delete profile', 'error');
                    }
                },
                error: function(xhr) {
                    const error = xhr.responseJSON?.error || 'Failed to delete profile';
                    showToast(error, 'error');
                }
            });
        }

        // Activate profile
        function activateProfile() {
            if (!currentProfileId) {
                showToast('Please save the profile first', 'error');
                return;
            }
            
            $.post(`/api/mappings/${currentProfileId}/activate`, function(response) {
                if (response.success) {
                    showToast('Profile activated', 'success');
                    $('#activeBadge').show();
                    $('#btnActivate').prop('disabled', true);
                    $('#btnDelete').prop('disabled', true);
                    loadProfiles();
                } else {
                    showToast(response.error || 'Failed to activate profile', 'error');
                }
            }).fail(function(xhr) {
                const error = xhr.responseJSON?.error || 'Failed to activate profile';
                showToast(error, 'error');
            });
        }

        // Clear form
        function clearForm() {
            currentProfileId = null;
            $('#profileName, #profileDescription').val('');
            $('#protocolFilter').val('ALL');
            $('#activeBadge').hide();
            $('#btnDuplicate, #btnDelete, #btnActivate').prop('disabled', true);
            $('#rulesTableBody').empty().append(`
                <tr>
                    <td colspan="4">
                        <div class="empty-state">
                            <i class="fas fa-project-diagram"></i>
                            <p>No mapping rules yet. Click "Add Rule" to get started.</p>
                        </div>
                    </td>
                </tr>
            `);
        }

        // Load sample data
        function loadSampleData() {
            const protocol = $('#sampleProtocol').val();
            $.get(`/api/mappings/sample/${protocol}`, function(response) {
                if (response.success) {
                    sampleData[protocol] = response.sample;
                }
            });
        }

        // Preview mapping
        function previewMapping() {
            const protocol = $('#sampleProtocol').val();
            const config = collectMappingRules();
            
            if (config.length === 0) {
                showToast('Add at least one mapping rule to preview', 'error');
                return;
            }
            
            if (!sampleData[protocol]) {
                showToast('Loading sample data...', 'info');
                loadSampleData();
                setTimeout(previewMapping, 1000);
                return;
            }
            
            $.ajax({
                url: '/api/mappings/preview',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    data: sampleData[protocol],
                    config: config
                }),
                success: function(response) {
                    if (response.success) {
                        $('#previewOutput').html('').jsonViewer(response.result, {collapsed: false});
                    } else {
                        showToast(response.error || 'Preview failed', 'error');
                    }
                },
                error: function(xhr) {
                    const error = xhr.responseJSON?.error || 'Preview failed';
                    showToast(error, 'error');
                }
            });
        }

        // Field browser
        function openFieldBrowser(btn) {
            currentInputTarget = $(btn).closest('.field-input-group').find('.source-path');
            $('#fieldBrowserModal').addClass('active');
            const protocol = $('#sampleProtocol').val();
            buildFieldTree(protocol);
        }

        function closeFieldBrowser() {
            $('#fieldBrowserModal').removeClass('active');
            currentInputTarget = null;
        }

        function switchProtocolTab(protocol) {
            $('.protocol-tab').removeClass('active');
            $(event.target).addClass('active');
            buildFieldTree(protocol);
        }

        function buildFieldTree(protocol) {
            if (!sampleData[protocol]) {
                $.get(`/api/mappings/sample/${protocol}`, function(response) {
                    if (response.success) {
                        sampleData[protocol] = response.sample;
                        renderFieldTree(sampleData[protocol], '', $('#fieldTree'));
                    }
                });
            } else {
                $('#fieldTree').empty();
                renderFieldTree(sampleData[protocol], '', $('#fieldTree'));
            }
        }

        function renderFieldTree(obj, path, container) {
            const ul = $('<ul></ul>');
            
            for (const [key, value] of Object.entries(obj)) {
                const li = $('<li></li>');
                const currentPath = path ? `${path}.${key}` : key;
                
                if (value && typeof value === 'object' && !Array.isArray(value)) {
                    // Object node
                    const node = $(`
                        <div class="field-node">
                            <i class="fas fa-folder"></i>
                            <span class="field-path">${key}</span>
                        </div>
                    `);
                    node.click(function(e) {
                        e.stopPropagation();
                        if (currentInputTarget) {
                            currentInputTarget.val(currentPath);
                            closeFieldBrowser();
                        }
                    });
                    li.append(node);
                    renderFieldTree(value, currentPath, li);
                } else if (Array.isArray(value) && value.length > 0) {
                    // Array node
                    const node = $(`
                        <div class="field-node">
                            <i class="fas fa-list"></i>
                            <span class="field-path">${key}[*]</span>
                        </div>
                    `);
                    node.click(function(e) {
                        e.stopPropagation();
                        if (currentInputTarget) {
                            currentInputTarget.val(`${currentPath}[*]`);
                            closeFieldBrowser();
                        }
                    });
                    li.append(node);
                    if (typeof value[0] === 'object') {
                        renderFieldTree(value[0], `${currentPath}[*]`, li);
                    }
                } else {
                    // Leaf node
                    const node = $(`
                        <div class="field-node">
                            <i class="fas fa-cube"></i>
                            <span class="field-path">${key}</span>
                        </div>
                    `);
                    node.click(function(e) {
                        e.stopPropagation();
                        if (currentInputTarget) {
                            currentInputTarget.val(currentPath);
                            closeFieldBrowser();
                        }
                    });
                    li.append(node);
                }
                
                ul.append(li);
            }
            
            container.append(ul);
        }

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = $('#toast');
            const icon = toast.find('i');
            
            toast.removeClass('success error info');
            toast.addClass(type);
            
            if (type === 'success') {
                icon.removeClass().addClass('fas fa-check-circle');
            } else if (type === 'error') {
                icon.removeClass().addClass('fas fa-exclamation-circle');
            } else {
                icon.removeClass().addClass('fas fa-info-circle');
            }
            
            $('#toastMessage').text(message);
            toast.addClass('active');
            
            setTimeout(function() {
                toast.removeClass('active');
            }, 3000);
        }

        // Close modal on background click
        $('.modal').click(function(e) {
            if (e.target === this) {
                $(this).removeClass('active');
            }
        });
    </script>
</body>
</html>
